services:
  postgres:
    image: postgres:16-alpine
    container_name: dashboard_v2_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: Dashboard_v2Db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d Dashboard_v2Db"]
      interval: 10s
      timeout: 5s
      retries: 5

  ldap:
    image: osixia/openldap:1.5.0
    container_name: dashboard_v2_ldap
    environment:
      LDAP_ORGANISATION: "Universidad de La Habana - MATCOM"
      LDAP_DOMAIN: "matcom.uh.cu"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_SEED_INTERNAL_LDIF_PATH: /container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
      - "389:389"
    volumes:
      - ./ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap.ldif
    restart: unless-stopped
    command: --copy-service

  ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    container_name: dashboard_v2_ldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
    ports:
      - "6443:443"
    depends_on:
      - ldap
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: dashboard_v2_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3-compatible
      - "9001:9001"   # Consola web de administración
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
