services:
  postgres:
    image: postgres:16-alpine
    container_name: dashboard_v2_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ldap:
    image: osixia/openldap:1.5.0
    container_name: dashboard_v2_ldap
    environment:
      LDAP_ORGANISATION: "Universidad de La Habana - MATCOM"
      LDAP_DOMAIN: "matcom.uh.cu"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD}"
      LDAP_SEED_INTERNAL_LDIF_PATH: /container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
      - "389:389"
    volumes:
      - ./ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/bootstrap.ldif
    restart: unless-stopped
    command: --copy-service

  ldap-admin:
    image: osixia/phpldapadmin:0.9.0
    container_name: dashboard_v2_ldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
    ports:
      - "6443:443"
    depends_on:
      - ldap
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: dashboard_v2_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # API S3-compatible
      - "9001:9001"   # Consola web de administración
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard_v2_api
    ports:
      - "${API_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Dashboard_v2Db=Server=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - Auth__Provider=Ldap
      - Auth__Ldap__Host=ldap
      - Auth__Ldap__Port=389
      - Auth__Ldap__BaseDn=dc=matcom,dc=uh,dc=cu
      - Auth__Ldap__UsersDn=ou=people,dc=matcom,dc=uh,dc=cu
      - Auth__Ldap__AdminDn=cn=admin,dc=matcom,dc=uh,dc=cu
      - Auth__Ldap__AdminPassword=${LDAP_ADMIN_PASSWORD}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__BucketName=dashboard-documents
      - MinIO__UseSSL=false
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=Dashboard_v2
      - Jwt__Audience=Dashboard_v2
      - Jwt__ExpiryMinutes=1440
    volumes:
      - ./src/Web/data/wos:/app/data/wos  # Montar archivos WoS externamente
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ldap:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
